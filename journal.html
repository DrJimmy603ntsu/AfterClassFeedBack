<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal Reading Club</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f5f0e8;
    --ink: #1a1614;
    --ink-light: #5a4e47;
    --ink-faint: #9a8f88;
    --accent: #8b4513;
    --accent-light: #d4956a;
    --white: #ffffff;
    --card-border: rgba(139,69,19,0.15);
    --shadow: rgba(26,22,20,0.08);
  }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .topbar {
    padding: 20px 40px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar a {
    font-size: 0.82rem;
    color: var(--ink-faint);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .topbar a:hover { color: var(--accent); }
  .topbar-sep { color: var(--ink-faint); font-size: 0.8rem; }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 40px 100px;
  }

  .page-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .page h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .tagline {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    color: var(--accent);
    font-weight: 400;
    margin-bottom: 36px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--card-border);
  }

  .body-text {
    font-size: 1rem;
    line-height: 1.9;
    color: var(--ink-light);
    font-weight: 300;
    margin-bottom: 40px;
  }

  .body-text p + p { margin-top: 16px; }

  .learn-block {
    background: var(--white);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 40px;
  }

  .learn-block h3 {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 18px;
  }

  .learn-block ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .learn-block ul li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 0.95rem;
    color: var(--ink-light);
    line-height: 1.6;
  }

  .learn-block ul li::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-light);
    flex-shrink: 0;
    margin-top: 8px;
  }

  .cta {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.8;
  }

  @media (max-width: 560px) {
    .page { padding: 48px 24px 80px; }
    .topbar { padding: 16px 24px; }
  }
</style>
</head>
<body>

<nav class="topbar">
  <a href="index.html">← 首頁</a>
  <span class="topbar-sep">/</span>
  <span style="font-size:0.82rem; color: var(--ink);">Journal Reading Club</span>
</nav>

<main class="page">
  <p class="page-eyebrow">📚 從證據開始</p>
  <h1>Journal Reading Club</h1>
  <p class="tagline">你讀的不是論文，是未來的可能性。</p>

  <div class="body-text">
    <p>每一篇醫學文獻，都在回答一個問題：</p>
    <p>「如果一個人長期這樣生活，最後會變成什麼樣子？」</p>
  </div>

  <div class="learn-block">
    <h3>你會學到</h3>
    <ul>
      <li>如何閱讀醫學研究</li>
      <li>如何判斷證據強度</li>
      <li>疾病與生活型態的關聯</li>
    </ul>
  </div>

  <p class="cta">👉 這裡是所有改變的起點</p>
</main>

</body>
</html>
