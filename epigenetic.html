<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>表觀遺傳學評估結果 Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --cream:#f5f0e8; --ink:#1a1614;
  --sage:#6b7c5e; --sage-light:rgba(107,124,94,0.1); --sage-mid:rgba(107,124,94,0.25);
  --gold:#c9a84c; --paper:#ece7dc; --warm:#f0e8df; --mist:#dde3d8;
  --teal:#4a7c6f; --olive:#8a9e6b; --brown:#8a6e5a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

.modal{background:var(--cream);border-radius:12px;max-width:600px;width:100%;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.15);animation:riseUp .5s cubic-bezier(.22,1,.36,1) both;}
@keyframes riseUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* HEAD */
.modal-head{
  background:linear-gradient(135deg,#3a5c3a 0%,var(--sage) 55%,#8aaa6e 100%);
  padding:32px 32px 28px;position:relative;overflow:hidden;
}
.modal-head::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.05);}
.modal-head::after{content:'';position:absolute;bottom:-60px;left:-30px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,0.04);}
.head-top{display:flex;align-items:center;gap:14px;margin-bottom:22px;position:relative;}
.head-icon{width:48px;height:48px;background:rgba(255,255,255,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.head-titles h2{font-family:'Noto Serif TC',serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:3px;}
.head-titles p{font-size:0.7rem;color:rgba(255,255,255,0.6);letter-spacing:.08em;}

/* OVERALL */
.overall-row{display:flex;align-items:center;gap:22px;position:relative;}
.score-ring{width:88px;height:88px;position:relative;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.15);stroke-width:6;}
.ring-fill{fill:none;stroke:#fff;stroke-width:6;stroke-linecap:round;stroke-dasharray:239;stroke-dashoffset:239;transition:stroke-dashoffset 1.3s cubic-bezier(.22,1,.36,1);}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.ring-pct{font-size:1.4rem;font-weight:900;color:#fff;line-height:1;}
.ring-label{font-size:0.52rem;color:rgba(255,255,255,0.65);letter-spacing:.04em;}
.overall-desc{flex:1;}
.overall-level{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:6px;}
.overall-sub{font-size:.78rem;color:rgba(255,255,255,0.72);line-height:1.65;}

/* BODY */
.modal-body{padding:26px 30px;}

/* DIMS */
.dims-title{font-size:.68rem;letter-spacing:.12em;color:var(--sage);font-weight:600;text-transform:uppercase;margin-bottom:14px;}
.dims-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:22px;}
.dim-card{background:var(--paper);border:1px solid rgba(26,22,20,0.08);border-radius:8px;padding:14px 15px;}
.dim-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.dim-icon{font-size:1rem;}
.dim-badge{font-size:.62rem;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:10px;}
.badge-ex  {background:rgba(74,124,111,0.15);color:var(--teal);}
.badge-good{background:rgba(107,124,94,0.15);color:var(--sage);}
.badge-mid {background:rgba(201,168,76,0.15);color:var(--gold);}
.badge-low {background:rgba(138,110,90,0.15);color:var(--brown);}
.dim-name{font-family:'Noto Serif TC',serif;font-size:.8rem;font-weight:600;color:var(--ink);margin-bottom:8px;}
.dim-bar-wrap{height:4px;background:rgba(26,22,20,0.08);border-radius:4px;overflow:hidden;}
.dim-bar{height:100%;border-radius:4px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1);}
.dim-val{font-size:.63rem;color:rgba(26,22,20,0.4);margin-top:5px;}

/* RADAR */
.radar-wrap{background:var(--paper);border:1px solid rgba(26,22,20,0.08);border-radius:8px;padding:18px 18px 14px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;}
.radar-legend{display:flex;flex-direction:column;gap:9px;}
.leg-item{display:flex;align-items:center;gap:8px;font-size:.72rem;color:rgba(26,22,20,.6);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* TIPS */
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.tip-card{background:var(--paper);border:1px solid rgba(26,22,20,0.07);border-radius:7px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
.tip-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.tip-text{font-size:.75rem;line-height:1.65;color:rgba(26,22,20,.65);}
.tip-text strong{color:var(--ink);display:block;margin-bottom:2px;font-size:.78rem;}

/* SUMMARY */
.summary-box{background:var(--sage-light);border-left:3px solid var(--sage);border-radius:0 6px 6px 0;padding:14px 18px;}
.summary-label{font-size:.68rem;color:var(--sage);font-weight:600;letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase;}
.summary-text{font-size:.85rem;line-height:1.8;color:rgba(26,22,20,.68);}

/* FOOTER */
.modal-footer{padding:18px 30px 22px;display:flex;gap:10px;}
.btn-done{flex:1;padding:.85rem;background:var(--ink);color:#fff;border:none;border-radius:6px;font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;font-weight:600;transition:.25s;}
.btn-done:hover{background:var(--sage);}
.btn-redo{flex:1;padding:.85rem;background:none;color:var(--ink);border:1.5px solid rgba(26,22,20,.18);border-radius:6px;font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;transition:.25s;}
.btn-redo:hover{border-color:var(--sage);color:var(--sage);}

@media(max-width:480px){
  .dims-grid,.tips-grid{grid-template-columns:1fr;}
  .modal-head,.modal-body,.modal-footer{padding-left:18px;padding-right:18px;}
  .overall-row{flex-direction:column;text-align:center;}
  .radar-wrap{flex-direction:column;}
}
</style>
</head>
<body>
<div class="modal">

  <!-- HEAD -->
  <div class="modal-head">
    <div class="head-top">
      <div class="head-icon">🧬</div>
      <div class="head-titles">
        <h2>表觀遺傳學健康評估結果</h2>
        <p>EPIGENETIC HEALTH ASSESSMENT RESULT</p>
      </div>
    </div>
    <div class="overall-row">
      <div class="score-ring">
        <svg viewBox="0 0 88 88" width="88" height="88">
          <circle class="ring-bg" cx="44" cy="44" r="38"/>
          <circle class="ring-fill" id="ringFill" cx="44" cy="44" r="38"/>
        </svg>
        <div class="ring-text">
          <span class="ring-pct" id="ringPct">—</span>
          <span class="ring-label">健康指數</span>
        </div>
      </div>
      <div class="overall-desc">
        <div class="overall-level" id="overallLevel">—</div>
        <div class="overall-sub" id="overallSub">—</div>
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="modal-body">
    <div class="dims-title">各維度詳細分析</div>
    <div class="dims-grid" id="dimsGrid"></div>

    <div class="radar-wrap">
      <svg id="radarSvg" viewBox="0 0 180 180" width="158" height="158"></svg>
      <div class="radar-legend" id="radarLegend"></div>
    </div>

    <div class="dims-title">改善建議</div>
    <div class="tips-grid" id="tipsGrid"></div>

    <div class="summary-box">
      <div class="summary-label">🌿 整體評估摘要</div>
      <div class="summary-text" id="summaryText">—</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="modal-footer">
    <button class="btn-done">✓ 完成</button>
    <button class="btn-redo">重新填寫</button>
  </div>
</div>

<script>
// ── Demo scores (replace with real form values) ─────────────────
const scores = {
  diet:    2.5,   // 飲食營養   1–4
  sleep:   3.2,   // 睡眠品質   1–4
  toxin:   2.0,   // 毒素暴露   1–4
  stress:  2.8,   // 運動壓力   1–4
};

const dims = [
  { key:'diet',   name:'飲食與營養', icon:'🌿', color:'#6b7c5e' },
  { key:'sleep',  name:'睡眠品質',   icon:'😴', color:'#4a7c6f' },
  { key:'toxin',  name:'環境毒素',   icon:'⚗️', color:'#8a9e6b' },
  { key:'stress', name:'運動與壓力', icon:'🏃', color:'#8a6e5a' },
];

const tips = {
  diet:   { icon:'🥦', title:'飲食優化',   text:'增加深色蔬菜與全穀物攝取，補充葉酸與 Omega-3，有助於 DNA 甲基化調控。' },
  sleep:  { icon:'🌙', title:'睡眠改善',   text:'維持固定就寢時間，睡前避免藍光，7–9 小時的優質睡眠對表觀遺傳修復至關重要。' },
  toxin:  { icon:'🛡️', title:'減少毒素',   text:'降低農藥、塑化劑與 PM2.5 暴露，使用不鏽鋼或玻璃容器替代塑膠製品。' },
  stress: { icon:'🧘', title:'壓力管理',   text:'規律有氧運動每週至少 3 次，搭配冥想或正念練習，有效降低皮質醇對基因的不良影響。' },
};

function levelInfo(v) {
  if (v >= 3.5) return { label:'優異', badge:'badge-ex'   };
  if (v >= 2.8) return { label:'良好', badge:'badge-good' };
  if (v >= 2.0) return { label:'中等', badge:'badge-mid'  };
  return              { label:'需改善', badge:'badge-low'  };
}

// Overall
const avg = Object.values(scores).reduce((a,b)=>a+b,0)/4;
const healthPct = Math.round((avg-1)/3*100);
document.getElementById('ringPct').textContent = healthPct+'%';

const { label: ovLabel } = levelInfo(avg);
const overallMap = {
  '優異': ['表觀遺傳環境優異','您的生活型態對基因表現有極佳的正向支持，請繼續保持！'],
  '良好': ['整體狀態良好','基礎穩固，針對中等分項稍加改善，即可達到更佳的基因健康。'],
  '中等': ['尚有顯著進步空間','建議優先改善飲食與環境毒素控管，逐步調整生活習慣。'],
  '需改善':['需要積極調整','多項指標偏低，建議諮詢營養師或健康顧問，制定個人化改善計畫。'],
};
document.getElementById('overallLevel').textContent = overallMap[ovLabel][0];
document.getElementById('overallSub').textContent   = overallMap[ovLabel][1];

// Ring
const circ = 2*Math.PI*38;
const fill = document.getElementById('ringFill');
fill.style.strokeDasharray  = circ;
fill.style.strokeDashoffset = circ;
setTimeout(()=>{
  fill.style.transition='stroke-dashoffset 1.3s cubic-bezier(.22,1,.36,1)';
  fill.style.strokeDashoffset = circ*(1-healthPct/100);
},120);

// Dim cards
const grid = document.getElementById('dimsGrid');
dims.forEach(d=>{
  const v=scores[d.key], pct=Math.round((v-1)/3*100);
  const {label,badge}=levelInfo(v);
  const card=document.createElement('div');
  card.className='dim-card';
  card.innerHTML=`
    <div class="dim-top"><span class="dim-icon">${d.icon}</span><span class="dim-badge ${badge}">${label}</span></div>
    <div class="dim-name">${d.name}</div>
    <div class="dim-bar-wrap"><div class="dim-bar" style="background:${d.color}" data-pct="${pct}"></div></div>
    <div class="dim-val">${v.toFixed(1)} / 4.0</div>`;
  grid.appendChild(card);
});
setTimeout(()=>document.querySelectorAll('.dim-bar').forEach(b=>b.style.width=b.dataset.pct+'%'),200);

// Tips
const tg=document.getElementById('tipsGrid');
dims.forEach(d=>{
  const t=tips[d.key];
  tg.innerHTML+=`<div class="tip-card"><div class="tip-icon">${t.icon}</div><div class="tip-text"><strong>${t.title}</strong>${t.text}</div></div>`;
});

// Radar
(function(){
  const svg=document.getElementById('radarSvg');
  const cx=90,cy=90,R=66,n=4;
  const vals=dims.map(d=>(scores[d.key]-1)/3);
  const angles=dims.map((_,i)=>(i/n)*2*Math.PI-Math.PI/2);
  // bg rings
  [.25,.5,.75,1].forEach(r=>{
    const pts=angles.map(a=>`${cx+R*r*Math.cos(a)},${cy+R*r*Math.sin(a)}`).join(' ');
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points',pts);p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(26,22,20,0.07)');p.setAttribute('stroke-width','1');
    svg.appendChild(p);
  });
  // axes + labels
  angles.forEach((a,i)=>{
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',cx);l.setAttribute('y1',cy);
    l.setAttribute('x2',cx+R*Math.cos(a));l.setAttribute('y2',cy+R*Math.sin(a));
    l.setAttribute('stroke','rgba(26,22,20,0.08)');l.setAttribute('stroke-width','1');
    svg.appendChild(l);
    const tx=cx+(R+14)*Math.cos(a),ty=cy+(R+14)*Math.sin(a);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',tx);t.setAttribute('y',ty);
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-size','9');t.setAttribute('fill','rgba(26,22,20,0.45)');
    t.setAttribute('font-family','Noto Sans TC,sans-serif');
    t.textContent=dims[i].icon;svg.appendChild(t);
  });
  // data poly
  const pts=angles.map((a,i)=>`${cx+R*vals[i]*Math.cos(a)},${cy+R*vals[i]*Math.sin(a)}`).join(' ');
  const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points',pts);
  poly.setAttribute('fill','rgba(107,124,94,0.2)');
  poly.setAttribute('stroke','#6b7c5e');poly.setAttribute('stroke-width','2');
  svg.appendChild(poly);
  // dots
  angles.forEach((a,i)=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx+R*vals[i]*Math.cos(a));c.setAttribute('cy',cy+R*vals[i]*Math.sin(a));
    c.setAttribute('r','4');c.setAttribute('fill',dims[i].color);svg.appendChild(c);
  });
})();

// Legend
const leg=document.getElementById('radarLegend');
dims.forEach(d=>{
  const {label}=levelInfo(scores[d.key]);
  leg.innerHTML+=`<div class="leg-item"><div class="leg-dot" style="background:${d.color}"></div>${d.name}：${label}</div>`;
});

// Summary
const summaryMap={
  '優異': '整體評估顯示您的生活型態對表觀遺傳健康有極佳的支持。請持續保持均衡飲食、規律運動與優質睡眠，這些習慣正在為您的基因表現帶來長遠的正向影響。',
  '良好': '您的表觀遺傳健康狀況良好，大多數生活習慣符合健康標準。建議針對評估中較弱的面向進一步優化，例如減少環境毒素暴露或強化壓力管理。',
  '中等': '部分生活習慣存在改善空間。建議優先從飲食多樣化與睡眠規律化著手，同時增加有氧運動頻率，逐步建立有益的表觀遺傳環境。',
  '需改善':'多項指標顯示需要積極改變生活型態。強烈建議尋求營養師或健康顧問的協助，制定個人化的飲食、運動與解毒計畫，以改善長期的基因表現環境。',
};
document.getElementById('summaryText').textContent=summaryMap[ovLabel];
</script>
</body>
</html>
