<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CBT 結果頁 Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --cream:#f5f0e8; --ink:#1a1614; --rust:#b85c38;
  --rust-light:rgba(184,92,56,0.08); --rust-mid:rgba(184,92,56,0.22);
  --gold:#c9a84c; --paper:#ece7dc; --warm:#f0e8df;
  --green:#6b7c5e; --blue:#5a6e8a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

/* MODAL */
.modal{background:var(--cream);border-radius:12px;max-width:600px;width:100%;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.18);animation:riseUp .5s cubic-bezier(.22,1,.36,1) both;}
@keyframes riseUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.modal-head{
  background: linear-gradient(135deg,#7a2e14 0%,var(--rust) 60%,#c4703e 100%);
  padding:32px 32px 28px; position:relative; overflow:hidden;
}
.modal-head::before{
  content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;
  border-radius:50%;background:rgba(255,255,255,0.06);
}
.modal-head::after{
  content:'';position:absolute;bottom:-60px;left:-20px;width:220px;height:220px;
  border-radius:50%;background:rgba(255,255,255,0.04);
}
.head-top{display:flex;align-items:center;gap:14px;margin-bottom:20px;position:relative;}
.head-icon{width:48px;height:48px;background:rgba(255,255,255,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.head-titles h2{font-family:'Noto Serif TC',serif;font-size:1.25rem;font-weight:700;color:#fff;margin-bottom:3px;}
.head-titles p{font-size:0.72rem;color:rgba(255,255,255,0.6);letter-spacing:.08em;}

/* OVERALL SCORE */
.overall-row{display:flex;align-items:center;gap:20px;position:relative;}
.score-ring-wrap{flex-shrink:0;}
.score-ring{width:80px;height:80px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.15);stroke-width:6;}
.ring-fill{fill:none;stroke:#fff;stroke-width:6;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1);}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:1.3rem;font-weight:900;color:#fff;line-height:1;}
.ring-label{font-size:0.55rem;color:rgba(255,255,255,0.65);letter-spacing:.05em;margin-top:1px;}
.overall-desc{flex:1;}
.overall-level{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:6px;}
.overall-sub{font-size:.78rem;color:rgba(255,255,255,0.7);line-height:1.6;}

/* BODY */
.modal-body{padding:28px 32px;}

/* DIMS */
.dims-title{font-size:.7rem;letter-spacing:.12em;color:var(--rust);font-weight:600;text-transform:uppercase;margin-bottom:14px;}
.dims-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.dim-card{background:var(--paper);border:1px solid rgba(26,22,20,0.08);border-radius:8px;padding:14px 16px;}
.dim-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dim-icon{font-size:1rem;}
.dim-badge{font-size:.65rem;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:10px;}
.badge-good{background:rgba(107,124,94,0.15);color:var(--green);}
.badge-mild{background:rgba(201,168,76,0.15);color:var(--gold);}
.badge-mid{background:rgba(184,92,56,0.12);color:var(--rust);}
.badge-high{background:rgba(180,40,40,0.12);color:#b42828;}
.dim-name{font-family:'Noto Serif TC',serif;font-size:.8rem;font-weight:600;color:var(--ink);margin-bottom:8px;}
.dim-bar-wrap{height:4px;background:rgba(26,22,20,0.08);border-radius:4px;overflow:hidden;}
.dim-bar{height:100%;border-radius:4px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1);}
.dim-val{font-size:.65rem;color:rgba(26,22,20,0.4);margin-top:5px;}

/* RADAR SVG */
.radar-wrap{background:var(--paper);border:1px solid rgba(26,22,20,0.08);border-radius:8px;padding:18px;margin-bottom:22px;display:flex;align-items:center;justify-content:center;gap:24px;}
.radar-legend{display:flex;flex-direction:column;gap:10px;}
.leg-item{display:flex;align-items:center;gap:8px;font-size:.72rem;color:rgba(26,22,20,.6);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* SUMMARY */
.summary-box{background:var(--rust-light);border-left:3px solid var(--rust);border-radius:0 6px 6px 0;padding:14px 18px;margin-bottom:8px;}
.summary-label{font-size:.68rem;color:var(--rust);font-weight:600;letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase;}
.summary-text{font-size:.85rem;line-height:1.8;color:rgba(26,22,20,.7);}

/* FOOTER */
.modal-footer{padding:20px 32px 24px;display:flex;gap:10px;}
.btn-close{flex:1;padding:.85rem;background:var(--ink);color:#fff;border:none;border-radius:6px;font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;font-weight:600;transition:.25s;}
.btn-close:hover{background:var(--rust);}
.btn-back{flex:1;padding:.85rem;background:none;color:var(--ink);border:1.5px solid rgba(26,22,20,.18);border-radius:6px;font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;transition:.25s;text-align:center;}
.btn-back:hover{border-color:var(--rust);color:var(--rust);}

@media(max-width:500px){
  .dims-grid{grid-template-columns:1fr;}
  .modal-head,.modal-body,.modal-footer{padding-left:20px;padding-right:20px;}
  .overall-row{flex-direction:column;text-align:center;}
  .radar-wrap{flex-direction:column;}
}
</style>
</head>
<body>
<div class="modal" id="modal">

  <!-- HEAD -->
  <div class="modal-head">
    <div class="head-top">
      <div class="head-icon">🧠</div>
      <div class="head-titles">
        <h2>認知行為療法評估結果</h2>
        <p>CBT PSYCHOLOGICAL ASSESSMENT RESULT</p>
      </div>
    </div>
    <div class="overall-row">
      <div class="score-ring-wrap">
        <div class="score-ring">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <circle class="ring-bg" cx="40" cy="40" r="35"/>
            <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="35"/>
          </svg>
          <div class="ring-text">
            <span class="ring-pct" id="ringPct">—</span>
            <span class="ring-label">健康指數</span>
          </div>
        </div>
      </div>
      <div class="overall-desc">
        <div class="overall-level" id="overallLevel">—</div>
        <div class="overall-sub" id="overallSub">—</div>
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="modal-body">
    <div class="dims-title">各維度詳細分析</div>
    <div class="dims-grid" id="dimsGrid"></div>

    <!-- RADAR -->
    <div class="radar-wrap">
      <svg id="radarSvg" viewBox="0 0 180 180" width="160" height="160"></svg>
      <div class="radar-legend" id="radarLegend"></div>
    </div>

    <!-- SUMMARY -->
    <div class="summary-box">
      <div class="summary-label">💡 個人化建議</div>
      <div class="summary-text" id="summaryText">—</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="modal-footer">
    <button class="btn-close">✓ 完成</button>
    <button class="btn-back">重新填寫</button>
  </div>
</div>

<script>
// ── Demo data (replace with real scores from the form) ──────────────
const scores = {
  auto: 2.8,   // 自動化思考  (1–4)
  cog:  3.2,   // 認知扭曲
  emo:  2.5,   // 情緒困擾
  beh:  1.8,   // 行為迴避
};

// ── Config ─────────────────────────────────────────────────────────
const dims = [
  { key:'auto', name:'自動化思考', icon:'💭', color:'#b85c38' },
  { key:'cog',  name:'認知扭曲程度', icon:'🔍', color:'#c9a84c' },
  { key:'emo',  name:'情緒困擾程度', icon:'🌊', color:'#6b7c5e' },
  { key:'beh',  name:'行為迴避程度', icon:'🎯', color:'#5a6e8a' },
];

function levelInfo(v) {
  if (v <= 1.5) return { label:'良好', badge:'badge-good' };
  if (v <= 2.5) return { label:'輕微', badge:'badge-mild' };
  if (v <= 3.2) return { label:'中等', badge:'badge-mid'  };
  return              { label:'需關注', badge:'badge-high' };
}

// ── Overall ────────────────────────────────────────────────────────
const avg = Object.values(scores).reduce((a,b)=>a+b,0) / 4;
const healthPct = Math.round((1 - (avg-1)/3) * 100); // invert: lower score = healthier

document.getElementById('ringPct').textContent = healthPct + '%';

const { label: ovLabel } = levelInfo(avg);
const overallMap = {
  '良好':  ['整體狀態良好', '您目前的認知與情緒狀態相當穩定，繼續保持！'],
  '輕微':  ['輕度困擾', '存在些許認知偏誤，學習 CBT 技術可有效改善。'],
  '中等':  ['中度困擾', '部分認知扭曲較明顯，建議考慮與心理師討論。'],
  '需關注':['需要關注', '建議盡快尋求專業心理諮商以獲得適切支持。'],
};
document.getElementById('overallLevel').textContent = overallMap[ovLabel][0];
document.getElementById('overallSub').textContent   = overallMap[ovLabel][1];

// Ring animation
const circ = 2 * Math.PI * 35;
const fill = document.getElementById('ringFill');
fill.style.strokeDasharray  = circ;
fill.style.strokeDashoffset = circ;
setTimeout(() => {
  fill.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1)';
  fill.style.strokeDashoffset = circ * (1 - healthPct/100);
}, 100);

// ── Dim cards ──────────────────────────────────────────────────────
const grid = document.getElementById('dimsGrid');
dims.forEach(d => {
  const v = scores[d.key];
  const pct = Math.round((v-1)/3*100);
  const { label, badge } = levelInfo(v);
  const card = document.createElement('div');
  card.className = 'dim-card';
  card.innerHTML = `
    <div class="dim-top">
      <span class="dim-icon">${d.icon}</span>
      <span class="dim-badge ${badge}">${label}</span>
    </div>
    <div class="dim-name">${d.name}</div>
    <div class="dim-bar-wrap"><div class="dim-bar" style="background:${d.color}" data-pct="${pct}"></div></div>
    <div class="dim-val">${v.toFixed(1)} / 4.0</div>`;
  grid.appendChild(card);
});
// animate bars
setTimeout(() => {
  document.querySelectorAll('.dim-bar').forEach(b => b.style.width = b.dataset.pct + '%');
}, 200);

// ── Radar chart ────────────────────────────────────────────────────
function radar() {
  const svg   = document.getElementById('radarSvg');
  const cx=90, cy=90, R=68, n=4;
  const vals  = dims.map(d => (scores[d.key]-1)/3); // 0–1
  const angles= dims.map((_,i) => (i/n)*2*Math.PI - Math.PI/2);

  // bg rings
  [.25,.5,.75,1].forEach(r => {
    const pts = angles.map(a=>`${cx+R*r*Math.cos(a)},${cy+R*r*Math.sin(a)}`).join(' ');
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',pts);
    poly.setAttribute('fill','none');
    poly.setAttribute('stroke','rgba(26,22,20,0.07)');
    poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
  });
  // axes
  angles.forEach((a,i) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx); line.setAttribute('y1',cy);
    line.setAttribute('x2',cx+R*Math.cos(a)); line.setAttribute('y2',cy+R*Math.sin(a));
    line.setAttribute('stroke','rgba(26,22,20,0.08)'); line.setAttribute('stroke-width','1');
    svg.appendChild(line);
    // axis label
    const tx = cx+(R+14)*Math.cos(a), ty = cy+(R+14)*Math.sin(a);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',tx); t.setAttribute('y',ty);
    t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-size','8'); t.setAttribute('fill','rgba(26,22,20,0.45)');
    t.setAttribute('font-family','Noto Sans TC,sans-serif');
    t.textContent = dims[i].icon;
    svg.appendChild(t);
  });
  // data polygon
  const pts = angles.map((a,i)=>`${cx+R*vals[i]*Math.cos(a)},${cy+R*vals[i]*Math.sin(a)}`).join(' ');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points',pts);
  poly.setAttribute('fill','rgba(184,92,56,0.18)');
  poly.setAttribute('stroke','#b85c38');
  poly.setAttribute('stroke-width','2');
  svg.appendChild(poly);
  // dots
  angles.forEach((a,i)=>{
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', cx+R*vals[i]*Math.cos(a));
    circle.setAttribute('cy', cy+R*vals[i]*Math.sin(a));
    circle.setAttribute('r','4'); circle.setAttribute('fill',dims[i].color);
    svg.appendChild(circle);
  });
}
radar();

// Legend
const leg = document.getElementById('radarLegend');
dims.forEach(d => {
  const v = scores[d.key];
  const { label } = levelInfo(v);
  leg.innerHTML += `<div class="leg-item"><div class="leg-dot" style="background:${d.color}"></div>${d.name}：${label}</div>`;
});

// ── Summary ────────────────────────────────────────────────────────
const summaries = {
  '良好':  '整體評估顯示您目前的認知與情緒狀態相當穩定。建議繼續保持健康的思考習慣與自我覺察，並定期進行自我檢視。',
  '輕微':  '您存在一些輕至中度的認知偏誤與情緒困擾。學習 CBT 的認知重構技術，如思維記錄表，或可有效改善您的思考模式。',
  '中等':  '評估顯示中等程度的心理困擾，部分認知扭曲模式較為明顯。建議考慮與心理健康專業人員討論，學習更有效的因應策略。',
  '需關注':'評估顯示較高程度的心理困擾。強烈建議尋求專業心理諮商或 CBT 治療，以獲得適切的支持與協助。您並不孤單。',
};
document.getElementById('summaryText').textContent = summaries[ovLabel];
</script>
</body>
</html>
